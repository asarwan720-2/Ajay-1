<html>

<head>
<style>
.top-bar{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.id-box{
  background:green;
  color:white;
  padding:10px 20px;
  border-radius:20px;
}

.wallet-box{
  background:red;
  color:white;
  padding:10px 20px;
  border-radius:20px;
}
</style>
</head>

<body>

<div class="top-bar">
  <div class="id-box">ID: <span id="userid"></span></div>
  <div class="wallet-box">₹ <span id="balance">0</span></div>
</div>

<h1>Welcome to Home Page</h1>


<!-- 🔥 YAHA DALNA HAI -->
<script>
var url = "https://script.google.com/macros/s/AKfycbwK1JlOooRRgg6bFsAE7p56u83nrpm6UWns60ca87plDjr6LTy1Sr-jPTncw4x0vFgSEQ/exec";

var mobile = localStorage.getItem("mobile");

fetch(url)
.then(res => res.json())
.then(data => {
  data.forEach(user => {
    if(user.mobile == mobile){
      document.getElementById("balance").innerText = user.balance;
      document.getElementById("userid").innerText = user.id;
    }
  });
});
</script>
  
</body>

</html>
