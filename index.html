<!DOCTYPE html>
<html>
<head>
<title>Ajay Khaiwal Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: white;
  padding: 20px;
  border-radius: 15px;
  width: 300px;
  text-align: center;
  box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
}

h2 {
  margin-bottom: 10px;
}

input {
  width: 90%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 95%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: #4facfe;
  color: white;
  font-size: 16px;
}

button:hover {
  background: #007bff;
}

#result {
  margin-top: 15px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="box">
  <h2>Signup</h2>
  <input id="mobile" placeholder="Mobile"><br>
  <input id="password" placeholder="Password"><br>
  <button onclick="signup()">Signup</button>

  <h2>Login</h2>
  <input id="lmobile" placeholder="Mobile"><br>
  <input id="lpassword" placeholder="Password"><br>
  <button onclick="login()">Login</button>

  <div id="result"></div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://kvvmkddbkgrtiiuswikt.supabase.co",
  "YOUR_API_KEY_HERE"
);

// SIGNUP
async function signup() {
  let mobile = document.getElementById("mobile").value;
  let password = document.getElementById("password").value;

  let { error } = await supabase
    .from("users")
    .insert([{ mobile: mobile, password: password, amount: 0 }]);

  if (error) {
    alert(error.message);
  } else {
    alert("Signup Success");
  }
}

// LOGIN
async function login() {
  let mobile = document.getElementById("lmobile").value;
  let password = document.getElementById("lpassword").value;

  let { data } = await supabase
    .from("users")
    .select("*")
    .eq("mobile", mobile)
    .eq("password", password);

  if (data && data.length > 0) {
    let user = data[0];
    document.getElementById("result").innerHTML =
      "ID: " + user.id + "<br>Wallet: ₹" + user.amount;
  } else {
    alert("Login Failed");
  }
}
</script>

</body>
</html>
