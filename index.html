<!DOCTYPE html>
<html>
<head>
  <title>Login System</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h2>Signup</h2>
<input id="mobile" placeholder="Mobile"><br><br>
<input id="password" placeholder="Password"><br><br>
<button onclick="signup()">Signup</button>

<h2>Login</h2>
<input id="lmobile" placeholder="Mobile"><br><br>
<input id="lpassword" placeholder="Password"><br><br>
<button onclick="login()">Login</button>

<h2 id="result"></h2>

<script>

// 🔥 SUPABASE CONNECT
const supabase = window.supabase.createClient(
  "https://kvvmkddbkgtriuswikt.supabase.co",
  "sb_publishable_v0Q4Re-oWkaZ5zDmc7vjmg_0dRODzck"
);

// ✅ SIGNUP
async function signup() {
  let mobile = document.getElementById("mobile").value;
  let password = document.getElementById("password").value;

  let { error } = await supabase
    .from("users")
    .insert([{ mobile: mobile, password: password, amount: 0 }]);

  if (error) {
    alert("Error: " + error.message);
  } else {
    alert("Signup Success");
  }
}

// ✅ LOGIN
async function login() {
  let mobile = document.getElementById("lmobile").value;
  let password = document.getElementById("lpassword").value;

  let { data, error } = await supabase
    .from("users")
    .select("*")
    .eq("mobile", mobile)
    .eq("password", password);

  if (data && data.length > 0) {
    let user = data[0];

    document.getElementById("result").innerHTML =
      "ID: " + user.id + "<br>Wallet: ₹" + user.amount;

  } else {
    alert("Login Failed");
  }
}

</script>

</body>
</html>
